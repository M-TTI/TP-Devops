name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start staging
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

      - name: Wait for services
        run: sleep 20

      - name: Smoke test staging
        env:
          BASE_URL: http://localhost:8081
        run: ./scripts/smoke-test.sh

      - name: Rollback on failure
        if: failure()
        run: docker compose -f docker-compose.staging.yml down

      - name: Teardown staging
        if: always()
        run: docker compose -f docker-compose.staging.yml down
  
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy production
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: docker compose up -d

      - name: Smoke test production
        env:
          BASE_URL: http://localhost:8080
        run: ./scripts/smoke-test.sh

  publish:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ghcr.io/m-tti/tp-devops/api:${{ github.sha }} ./api
          docker push ghcr.io/m-tti/tp-devops/api:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/m-tti/tp-devops/frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/m-tti/tp-devops/frontend:${{ github.sha }}

      - name: Tag semver if release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker tag ghcr.io/m-tti/tp-devops/api:${{ github.sha }} ghcr.io/m-tti/tp-devops/api:${VERSION}
          docker tag ghcr.io/m-tti/tp-devops/frontend:${{ github.sha }} ghcr.io/m-tti/tp-devops/frontend:${VERSION}
          docker push ghcr.io/m-tti/tp-devops/api:${VERSION}
          docker push ghcr.io/m-tti/tp-devops/frontend:${VERSION}